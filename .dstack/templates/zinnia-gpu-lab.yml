type: template
name: zinnia-gpu-lab

title: Zinnia GPU Lab
description: Launch a Zed-ready GPU workspace with optional repository checkout across the Zinnia compute pool.

parameters:
  - type: name
  - type: ide
  - type: resources
  - type: python_or_docker
  - type: repo
  - type: working_dir

configuration:
  type: dev-environment

  # The launch wizard can select a Python version or a custom image. If neither
  # is specified, dstack's base image supplies its managed default Python.
  ide: zed
  working_dir: /dstack/run

  # The default dstack image already includes uv, Python, CUDA drivers, MPI,
  # and NCCL tests. Add nvcc so the environment can also build CUDA extensions.
  nvcc: true

  fleets: [pooled-gpu]
  backends: [vastai, runpod, lambda]
  spot_policy: auto
  max_price: 2.50
  max_duration: 6h

  # Stop the run after it has had no IDE, SSH, apply, or attach connection for
  # one hour. Fleet-level idle_duration separately destroys reusable VM nodes.
  inactivity_duration: 1h

  retry:
    on_events: [no-capacity, interruption]
    duration: 20m

  resources:
    # Preserve the open range through dstack 0.20.28's Launch UI. A bare
    # `8..` is incorrectly parsed as exactly 8 CPUs and excludes larger hosts.
    cpu: x86:8..
    memory: 64GB..
    disk: 200GB..
    # Avoid /dev/shm exhaustion in PyTorch dataloaders and multi-process tools.
    shm_size: 16GB
    gpu:
      memory: 24GB..
      count: 1
