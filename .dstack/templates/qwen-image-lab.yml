type: template
name: qwen-image-lab

title: Qwen Image Lab
description: Iterate on Qwen image editing, reference images, and LoRAs with Zed REPL cells.

parameters:
  - type: name
  - type: repo
  - type: working_dir

configuration:
  type: dev-environment

  # Built from images/qwen-image-lab/Dockerfile and pinned to the digest that
  # passed the dstack import/kernel/starter smoke task.
  image: ghcr.io/gurdasnijor/zinnia-image-lab@sha256:d25af4441c900033a0a8338067379792948496d10f1b48ff30f5d232447988af
  ide: zed
  working_dir: /dstack/run

  env:
    - HF_TOKEN=${{ secrets.HF_TOKEN }}
    - HF_HOME=/root/.cache/huggingface
    - HF_ENABLE_PARALLEL_LOADING=true
    - HF_XET_HIGH_PERFORMANCE=1

  init:
    - |
      set -eu
      if [ -z "$(find /dstack/run -mindepth 1 -maxdepth 1 -print -quit)" ]; then
        cp -a /opt/zinnia/starters/qwen-image-lab/. /dstack/run/
      fi
    - |
      python - <<'PY'
      import os
      from huggingface_hub import login

      token = os.environ.get("HF_TOKEN")
      if token:
          login(token=token, add_to_git_credential=False)
      PY

  fleets: [pooled-gpu]
  backends: [vastai, runpod, lambda]
  spot_policy: auto
  max_price: 5.00
  max_duration: 6h

  # Stop only after Zed, SSH, apply, and attach have all been disconnected for
  # two hours. This is distinct from fleet-level instance idle teardown.
  inactivity_duration: 2h

  retry:
    on_events: [no-capacity, interruption]
    duration: 20m

  resources:
    # Qwen-Image-Edit-2511 contains 20B BF16 parameters and roughly 58GB of
    # repository assets. An 80GB GPU avoids offload during notebook iteration.
    cpu: x86:16..
    memory: 128GB..
    disk: 200GB..
    shm_size: 16GB
    gpu:
      memory: 80GB..
      count: 1
