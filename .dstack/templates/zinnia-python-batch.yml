type: template
name: zinnia-python-batch

title: Zinnia Python Batch
description: Run an arbitrary Python or shell batch command on an ephemeral GPU worker.

parameters:
  - type: name
  - type: resources
  - type: python_or_docker
  - type: repo
  - type: working_dir
  - type: env
    title: Batch command
    name: BATCH_COMMAND
    value: python --version

configuration:
  type: task

  python: "3.12"
  commands:
    - bash -lc "$BATCH_COMMAND"

  fleets: [pooled-gpu]
  backends: [vastai, runpod, lambda]
  spot_policy: auto
  max_price: 2.50
  max_duration: 3h
  idle_duration: 5m

  retry:
    on_events: [no-capacity, interruption]
    duration: 20m

  resources:
    cpu: 8..
    memory: 64GB..
    disk: 150GB..
    gpu:
      memory: 24GB..
      count: 1
