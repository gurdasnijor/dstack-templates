name: Build Qwen Image Lab image

on:
  pull_request:
    paths:
      - .github/workflows/qwen-image-lab-image.yml
      - images/qwen-image-lab/**
      - starters/qwen-image-lab/**
  push:
    branches: [main]
    paths:
      - .github/workflows/qwen-image-lab-image.yml
      - images/qwen-image-lab/**
      - starters/qwen-image-lab/**
  workflow_dispatch:
    inputs:
      promote_digest:
        description: Existing smoke-tested sha256 digest to tag as promoted (leave empty to build)
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: qwen-image-lab-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/gurdasnijor/zinnia-image-lab

jobs:
  build:
    # A pull request from this repository may publish a test image. Do not give
    # an untrusted fork write access to the package registry.
    if: >-
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) &&
      (github.event_name != 'workflow_dispatch' || inputs.promote_digest == '')
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags and labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=long

      - name: Build and push amd64 image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: images/qwen-image-lab/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max

      - name: Record immutable image reference
        run: |
          {
            echo '### Qwen Image Lab image'
            echo
            echo '```text'
            echo "${IMAGE}@${{ steps.build.outputs.digest }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  promote:
    name: Preserve validated digest
    if: github.event_name == 'workflow_dispatch' && inputs.promote_digest != ''
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag the validated manifest
        id: promote
        env:
          DIGEST: ${{ inputs.promote_digest }}
        run: |
          set -euo pipefail
          if ! grep -Eq '^sha256:[0-9a-f]{64}$' <<<"$DIGEST"; then
            echo "promote_digest must be a complete sha256 digest" >&2
            exit 2
          fi

          short="${DIGEST#sha256:}"
          tag="promoted-$(date -u +%Y%m%d)-${short:0:12}"
          source="${IMAGE}@${DIGEST}"
          target="${IMAGE}:${tag}"

          docker buildx imagetools inspect "$source" >/dev/null
          docker buildx imagetools create --tag "$target" "$source"
          echo "target=$target" >> "$GITHUB_OUTPUT"

      - name: Record promoted reference
        run: |
          {
            echo '### Promoted Qwen Image Lab image'
            echo
            echo '```text'
            echo '${{ steps.promote.outputs.target }}'
            echo '${{ env.IMAGE }}@${{ inputs.promote_digest }}'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
